# Constella CORE - 开发环境 SQLite 配置
# 用于开发时使用本地 SQLite 数据库进行测试（npm run dev:sqlite）

app:
  env: development
  port: 3000
  apiPrefix: /api/v1

cors:
  origin: '*'

jwt:
  secret: your_jwt_secret_key_change_in_production
  expiresIn: 7d
  refreshExpiresIn: 30d

rateLimit:
  windowMs: 900000  # 15分钟
  maxRequests: 100

logging:
  level: debug

# 开发环境 SQLite 配置
database:
  type: sqlite
  sqlite:
    filepath: ./data/constella-dev.db

websocket:
  path: /ws
  pingInterval: 30000
  pingTimeout: 5000

# Yjs 文档持久化配置
yjs:
  persistence:
    type: leveldb
    leveldbPath: ./data/yjs
    snapshotInterval: 3600000  # 1小时快照一次
