# Constella CORE - 测试环境配置

app:
  env: test
  port: 3001
  apiPrefix: /api/v1

cors:
  origin: '*'

jwt:
  secret: test_jwt_secret_key_for_testing_only
  expiresIn: 1h
  refreshExpiresIn: 24h

rateLimit:
  windowMs: 900000
  maxRequests: 1000

logging:
  level: error  # 测试时减少日志输出

# 测试环境使用内存数据库
database:
  type: memory
  memory:
    filename: ':memory:'

websocket:
  path: /yjs
  pingInterval: 30000
  pingTimeout: 5000

yjs:
  persistence:
    type: leveldb
    leveldbPath: ./data/yjs-test
