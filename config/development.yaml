# Constella CORE - 开发环境配置
# 默认使用内存数据库以获得最佳开发体验

app:
  env: development
  port: 3000
  apiPrefix: /api/v1

cors:
  origin: '*'

jwt:
  secret: your_jwt_secret_key_change_in_production
  expiresIn: 7d
  refreshExpiresIn: 30d

rateLimit:
  windowMs: 900000  # 15分钟
  maxRequests: 100

logging:
  level: debug

# 开发环境默认使用内存数据库
database:
  type: memory
  memory:
    filename: ':memory:'

websocket:
  path: /ws
  pingInterval: 30000
  pingTimeout: 5000

# Yjs 文档持久化配置
yjs:
  persistence:
    type: leveldb
    leveldbPath: ./data/yjs
    snapshotInterval: 3600000  # 1小时快照一次
