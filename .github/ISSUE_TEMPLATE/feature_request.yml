name: Feature Request
description: Propose an API, collaboration, or backend workflow improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Auth
        - Database
        - Yjs / WebSocket
        - Config / Deployment
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility / migration impact
      description: Mention breaking changes, config updates, or migration considerations
  - type: textarea
    id: context
    attributes:
      label: Additional context
