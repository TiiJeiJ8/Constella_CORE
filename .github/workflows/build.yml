name: Build & Test Backend

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Server (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.20.8, 20.19.0]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  package-runtime:
    name: Package Server Runtime
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: npm install

      - name: Build server
        run: npm run build

      - name: Prepare runtime bundle
        shell: bash
        run: |
          rm -rf runtime-bundle
          mkdir -p runtime-bundle
          cp -r dist runtime-bundle/dist
          cp -r config runtime-bundle/config
          cp package.json runtime-bundle/package.json
          cp package-lock.json runtime-bundle/package-lock.json

      - name: Install production dependencies in runtime bundle
        run: npm ci --omit=dev
        working-directory: runtime-bundle

      - name: Upload server dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: dist
          retention-days: 5

      - name: Upload server runtime artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: server-runtime
          path: runtime-bundle
          retention-days: 5
