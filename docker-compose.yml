version: "3.8"
services:
  core:
    build: .
    image: constella-core-api:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api/v1
      JWT_SECRET: change_this_secret
    volumes:
      - ./data/yjs:/usr/src/app/data/yjs
      - ./config:/usr/src/app/config
      - ./uploads:/usr/src/app/uploads
      - ./logs:/usr/src/app/logs
